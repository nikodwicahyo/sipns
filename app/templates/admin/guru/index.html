{% extends "base.html" %}
{% block title %}Data Guru - SIPNS{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h3><i class="bi bi-person-badge"></i> Data Guru</h3>
    <a href="{{ url_for('admin.tambah_guru') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Tambah Guru
    </a>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover datatable" id="guruTable">
            <thead>
                <tr>
                    <th>ID Guru</th>
                    <th>Nama</th>
                    <th>Mata Pelajaran</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for g in guru_list %}
                <tr>
                    <td>{{ g.id_guru }}</td>
                    <td>{{ g.nama_guru }}</td>
                    <td>{{ g.mata_pelajaran }}</td>
                    <td>
                        <a href="{{ url_for('admin.edit_guru', id=g.id) }}" class="btn btn-sm btn-outline-primary" title="Edit">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button class="btn btn-sm btn-outline-danger" onclick="confirmHapus('{{ url_for('admin.hapus_guru', id=g.id) }}', '{{ g.nama_guru }}')" title="Hapus">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    $(document).ready(function() {
        $('#guruTable').DataTable({
            language: {
                processing: "Memproses...",
                lengthMenu: "Tampilkan _MENU_ data",
                zeroRecords: "Tidak ditemukan data",
                info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
                infoEmpty: "Menampilkan 0 sampai 0 dari 0 data",
                infoFiltered: "(disaring dari _MAX_ data keseluruhan)",
                search: "Cari:"
            },
            pageLength: 10,
            lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "Semua"]]
        });
    });
</script>
{% endblock %}
