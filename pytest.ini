[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    unit: Unit tests untuk fungsi/method individual
    integration: Integration tests untuk route, database, dan alur multi-komponen
    functional: Functional tests (pengujian alur end-to-end)
    security: Security tests (CSRF, SQL injection, XSS, role isolation)
    slow: Test yang berjalan lambat (generate PDF, Excel besar)
filterwarnings =
    ignore::DeprecationWarning
